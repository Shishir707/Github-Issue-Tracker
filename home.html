<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Github Issue Tracker : Home</title>
</head>

<body class="bg-base-300">
    <header>
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-8 items-center">
            <div class="flex-1">
                <div class="flex">
                    <img src="./assets/github-logo.png" alt="Github Logo"
                        class="w-[28px] md:w-8 h-[28px] md:h-8 mr-2" />
                    <a class="text-md md:text-xl font-bold ">Github Issue Tracker</a>

                </div>
            </div>
            <div class="flex gap-2 flex-wrap">
                <label class="input input-bordered flex items-center gap-2 w-24 md:w-auto">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchText" placeholder="Search Issues" class="grow" />
                </label>
                <button class="btn btn-primary w-20 md:w-auto"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <div class="p-8 md:p-10 mt-8 w-5/6 bg-white mx-auto gap-4 rounded-md shadow-md">
        <button id="allBtn" class="btn selected" onclick="loadItems()">All</button>
        <button id="openBtn" class="btn" onclick="openData()">Open</button>
        <button id="closedBtn" class="btn" onclick="closedData()">Closed</button>
    </div>

    <div class="p-2 md:p-4 mt-4 w-5/6 bg-white mx-auto gap-4 rounded-md shadow-md">
        <div class="flex items-center gap-2 md:gap-4">
            <div class="flex items-center gap-1 md:gap-4">
                <img src="./assets/Aperture.png" alt="Aperture Logo"
                    class="w-8 h-8 md:w-12 md:h-12 rounded-full shadow-violet-500" />
                <div>
                    <h2 class="text-sm md:text-xl font-bold"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-xs md:text-md text-gray-400">Track and manage your project issues</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 ml-auto">
                <p class="text-xs md:text-lg">🟢 Open</p>
                <p class="text-xs md:text-lg">🟣 Closed</p>
            </div>
        </div>
    </div>


    <div class="p-2 md:p-4 mt-4 w-5/6 bg-white mx-auto gap-4 rounded-md shadow-md">
        <div id="loader" class="text-center my-5">
            <span class="loading loading-spinner loading-xl"></span>
        </div>
        <div id="showItems" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>
