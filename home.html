<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github Issue Tracker : Home</title>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <div class="flex">
                    <img src="./assets/github-logo.png" alt="Github Logo" class="w-8 h-8 mr-2" />
                    <a class="text-xl font-bold">Github Issue Tracker</a>

                </div>
            </div>
            <div class="flex gap-2">

                <label class="input input-bordered flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchText" placeholder="Search Issues" class="grow" />
                </label>

                <button class="btn btn-primary">+ New Issue</button>

            </div>
        </div>
    </header>

</body>

</html>
