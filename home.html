<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github Issue Tracker : Home</title>
</head>

<body class="bg-base-300">
    <header>
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-8">
            <div class="flex-1">
                <div class="flex">
                    <img src="./assets/github-logo.png" alt="Github Logo" class="w-8 h-8 mr-2" />
                    <a class="text-xl font-bold">Github Issue Tracker</a>

                </div>
            </div>
            <div class="flex gap-2">
                <label class="input input-bordered flex items-center gap-2 w-24 md:w-auto">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchText" placeholder="Search Issues" class="grow" />
                </label>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <div class="p-8 md:p-10 mt-8 w-5/6 bg-white mx-auto gap-4 rounded-md shadow-md">
        <button type="submit" class="btn">All</button>
        <button type="submit" class="btn">Open</button>
        <button type="submit" class="btn">Closed</button>
    </div>

    <div class="p-2 md:p-4 mt-4 w-5/6 bg-white mx-auto gap-4 rounded-md shadow-md">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="./assets/Aperture.png" alt="Aperture Logo" class="w-12 h-12 rounded-full shadow-violet-500" />
                <div>
                    <h2 class="text-xl font-bold">50 Issues</h2>
                    <p class="text-sm text-gray-400">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-4 ml-auto">
                <p>🟢 Open</p>
                <p>🟣 Closed</p>
            </div>
        </div>
    </div>

</body>



</html>
