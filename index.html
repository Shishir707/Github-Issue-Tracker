<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Github Issue Tracker</title>

</head>

<body class="bg-base-300 text-base-content">

    <div class="flex flex-col items-center justify-center min-h-screen bg-white">

        <img src="/assets/github-logo.png" alt="Github Logo" class="w-16 h-16 mb-4" />

        <h2 class="text-2xl font-bold mt-4">Github Issue Tracker</h2>
        <p class="text-base-content/70 mb-4">Sign in to manage your issues</p>

        <fieldset class="fieldset bg-base-200 border-base-400 rounded-box w-xs border p-4">
            <legend class="fieldset-legend">Login</legend>

            <label class="label text-base-content text-sm font-semibold">Username</label>
            <input type="text" id="username" class="input mb-4" placeholder="Enter Username" />

            <label class="label text-base-content text-sm font-semibold">Password</label>
            <input type="password" id="password" class="input mb-8" placeholder="Enter Password" />


            <button class="btn btn-primary" onclick="signInButton()">Sign In</button>
        </fieldset>

    </div>

    <script src="scripts/login.js"></script>

</body>

</html>
